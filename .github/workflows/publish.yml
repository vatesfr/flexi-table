name: Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Run the full CI suite before publishing
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run type-check
      - run: npm run build

      - run: npm publish -w packages/core --provenance --access public
      - run: npm publish -w packages/react --provenance --access public
      - run: npm publish -w packages/vue --provenance --access public
      - run: npm publish -w packages/vanilla --provenance --access public
